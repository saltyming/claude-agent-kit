name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # macOS
          - target: aarch64-apple-darwin
            os: macos-latest
            name: workslate-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            name: workslate-x86_64-apple-darwin
          # Linux glibc
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: workslate-aarch64-unknown-linux-gnu
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: workslate-x86_64-unknown-linux-gnu
          # Linux musl (static)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: workslate-aarch64-unknown-linux-musl
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: workslate-x86_64-unknown-linux-musl
          # Windows
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            name: workslate-aarch64-pc-windows-msvc
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: workslate-x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64"* ]]; then
            wget -qO- https://musl.cc/aarch64-linux-musl-cross.tgz | sudo tar xz -C /opt
            echo "/opt/aarch64-linux-musl-cross/bin" >> "$GITHUB_PATH"
          fi

      - name: Configure linker (Linux cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Configure linker (musl ARM64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          mkdir -p .cargo
          printf '[target.aarch64-unknown-linux-musl]\nlinker = "aarch64-linux-musl-gcc"\n' >> .cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p workslate
        env:
          CC_aarch64_unknown_linux_musl: ${{ matrix.target == 'aarch64-unknown-linux-musl' && 'aarch64-linux-musl-gcc' || '' }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz workslate
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/workslate.exe" -DestinationPath "${{ matrix.name }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
