name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # macOS
          - target: aarch64-apple-darwin
            os: macos-latest
            name: workslate-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            name: workslate-x86_64-apple-darwin
          # Linux glibc
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: workslate-aarch64-unknown-linux-gnu
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: workslate-x86_64-unknown-linux-gnu
          # Linux musl (static)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: workslate-aarch64-unknown-linux-musl
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: workslate-x86_64-unknown-linux-musl
          # Windows
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            name: workslate-aarch64-pc-windows-msvc
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: workslate-x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        if: runner.os == 'Linux'
        run: pip3 install ziglang && cargo install cargo-zigbuild

      - name: Build (Linux via zigbuild)
        if: runner.os == 'Linux'
        run: cargo zigbuild --release --target ${{ matrix.target }} -p workslate

      - name: Build (macOS / Windows)
        if: runner.os != 'Linux'
        run: cargo build --release --target ${{ matrix.target }} -p workslate

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz workslate
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/workslate.exe" -DestinationPath "${{ matrix.name }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
